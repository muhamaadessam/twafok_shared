name: twafok_shared
description: Shared widgets, utilities, and themes for Twafok projects
version: 1.0.1+14
homepage: https://github.com/muhamaadessam/twafok_shared

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  connectivity_plus: ^6.1.5
  cupertino_icons: ^1.0.2
  dio: ^5.3.3
  equatable: ^2.0.5
  file_picker: ^11.0.2
  flutter_bloc: ^9.0.0
  flutter_screenutil: ^5.9.3
  flutter_spinkit: ^5.2.0
  flutter_speed_dial: ^7.0.0
  flutter_svg: ^2.0.9
  get_it: ^9.2.1
  internet_connection_checker: ^3.0.1
  intl: ^0.20.2
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  url_launcher_ios: ^6.2.4
  very_good_analysis: ^10.2.0
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  flutter_secure_storage: ^10.3.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
